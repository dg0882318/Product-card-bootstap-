<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="style.css">


</head>

<body>

<div class="container-checkout">

<form onsubmit="placeOrder(event)">

<div class="row">

<!-- left side -->
<div class="column">
    <h3 class="title">Bill Address</h3>

    <div class="inputBox">
        <span> Name </span>
        <input type="text" id="name" placeholder="John Doe">
    </div>

    <div class="inputBox">
        <span>Email</span>
        <input type="email" id="email" placeholder="john@gmail.com">
    </div>

    <div class="inputBox">
        <span>Address</span>
        <input type="text" id="address" placeholder="Street / House">
    </div>

    <div class="inputBox">
        <span>City</span>
        <input type="text" placeholder="Karachi">
    </div>

    <div class="flex">
        <div class="inputBox">
            <span>State</span>
            <input type="text" placeholder="Sindh">
        </div>

        <div class="inputBox">
            <span>Zip Code</span>
            <input type="text" placeholder="74000">
        </div>
    </div>

    <div class="inputBox">
        <span>Phone</span>
        <input type="text" id="phone" placeholder="03XXXXXXXXX">
    </div>

</div>

<!-- right side -->
<div class="column">
    <h3 class="title">Payment Option </h3>

    <div class="inputBox">
        <span>Cards Accepted</span>
        <img src="images/image.png" alt="" style="width:200px;">
    </div>

    <div class="inputBox">
        <span>Name on Card</span>
        <input type="text" placeholder="John Doe">
    </div>

    <div class="inputBox">
        <span>Card Number</span>
        <input type="text" placeholder="1111 2222 3333 4444">
    </div>

    <div class="inputBox">
        <span>Exp Month</span>
        <input type="text" placeholder="January">
    </div>

    <div class="flex">
        <div class="inputBox">
            <span>Exp Year</span>
            <input type="text" placeholder="2026">
        </div>

        <div class="inputBox">
            <span>CVV</span>
            <input type="text" placeholder="123">
        </div>
    </div>

</div>

</div>

<div class="order-summary">
    <h3> Order</h3>
    <div id="orderItems"></div>
    <h2 id="total"></h2>
</div>

<button type="submit" class="btn">Place Order</button>

</form>
</div>

<script src="script.js"></script>

</body>
</html>
